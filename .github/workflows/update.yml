name: Puan Durumu Güncelleyici

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Canlı Veriyi Çek ve HTML Oluştur
      env:
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      run: python update_live_data.py

    - name: Güvenli Otomatik Kayıt
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Canlı puan durumu otomatik güncellendi"
        file_pattern: 'wc2026_groups_live.html'
