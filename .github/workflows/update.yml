name: Puan Durumu Güncelleyici

on:
  schedule:
    - cron: '*/30 * * * *' # 30 dakikada bir otomatik çalışır
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Canlı Veriyi Çek ve HTML Oluştur
      env:
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      run: python update_live_data.py

    - name: Değişiklikleri Kaydet ve Gönder
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add wc2026_groups_live.html
        git diff-index --quiet HEAD || (git commit -m "Canlı puan durumu otomatik güncellendi" && git pull --rebase origin main && git push origin main)
